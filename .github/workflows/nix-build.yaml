name: 'CI: Nix build'

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Check if Nix-related files changed
  changes:
    runs-on: ubuntu-24.04-arm
    outputs:
      nix: ${{ steps.filter.outputs.nix }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            nix:
              - 'flake.nix'
              - 'flake.lock'
              - 'nix/**'
              - '.github/workflows/nix-build.yaml'
              - '.github/actions/setup-nix/**'

  build-ubuntu:
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Skip if no Nix changes
        if: needs.changes.outputs.nix != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No Nix-related changes detected, skipping build"

      - name: Checkout repository
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Nix
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build Linux (Home Manager) configuration
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          nix build .#homeConfigurations.11gather11.activationPackage \
            --print-build-logs \
            --show-trace

  build-ubuntu-arm:
    needs: changes
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - name: Skip if no Nix changes
        if: needs.changes.outputs.nix != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No Nix-related changes detected, skipping build"

      - name: Checkout repository
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Nix
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build Linux (Home Manager) configuration for aarch64
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          nix build .#homeConfigurations.11gather11-aarch64.activationPackage \
            --print-build-logs \
            --show-trace

  build-darwin:
    needs: changes
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Skip if no Nix changes
        if: needs.changes.outputs.nix != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No Nix-related changes detected, skipping build"

      - name: Checkout repository
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Nix
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build macOS (nix-darwin + Home Manager) configuration
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          nix build .#darwinConfigurations.11gather11.system \
            --print-build-logs \
            --show-trace
