name: Nix Diff Check

on:
  pull_request:
    paths:
      - 'flake.lock'
      - 'flake.nix'
      - 'nix/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  nix-diff:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Run nix-diff
        uses: natsukium/nix-diff-action@bbcfd4197376144ac47574d5f82723b90d502aab # main
        with:
          skip-no-change: true
          attributes: |
            - displayName: home-manager (x86_64-linux)
              attribute: diffTargets.home-x86_64-linux
            - displayName: home-manager (aarch64-linux)
              attribute: diffTargets.home-aarch64-linux
