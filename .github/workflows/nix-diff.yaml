name: Nix Diff Check

on:
  pull_request:
    paths:
      - 'flake.lock'
      - 'flake.nix'
      - 'nix/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  nix-diff:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Run nix-diff
        uses: natsukium/nix-diff-action@4091452e4c7b3c7ea4ecbaec84be7f0066d810d7 # main
        with:
          skip-no-change: true
          attributes: |
            - displayName: home-manager (x86_64-linux)
              attribute: diffTargets.home-x86_64-linux
            - displayName: home-manager (aarch64-linux)
              attribute: diffTargets.home-aarch64-linux
