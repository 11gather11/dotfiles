name: Nix Diff Check

on:
  pull_request:
    paths:
      - 'flake.lock'
      - 'flake.nix'
      - 'nix/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  nix-diff:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Run nix-diff
        uses: natsukium/nix-diff-action@b5c316c6cafc8470037d7f330b178aaeeba96ba4 # main
        with:
          skip-no-change: true
          attributes: |
            - displayName: home-manager (x86_64-linux)
              attribute: diffTargets.home-x86_64-linux
            - displayName: home-manager (aarch64-linux)
              attribute: diffTargets.home-aarch64-linux
